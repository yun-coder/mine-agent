# Langfuse v3 自托管 - 全栈监控
# 架构: PostgreSQL + ClickHouse + Redis + MinIO + Langfuse Web/Worker

x-environment: &langfuse-env
  # Database
  DATABASE_URL: postgresql://langfuse:${LANGFUSE_PG_PW:-langfuse_pw}@postgres:5432/langfuse
  # ClickHouse(分析/trace 存储)
  CLICKHOUSE_URL: http://clickhouse:8123
  CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
  CLICKHOUSE_USER: langfuse
  CLICKHOUSE_PASSWORD: ${LANGFUSE_CH_PW:-langfuse_pw}
  CLICKHOUSE_DATABASE: langfuse
  CLICKHOUSE_DB: langfuse
  CLICKHOUSE_CLUSTER_ENABLED: "false"
  # Redis 队列 (v3+ env: REDIS_CONNECTION_STRING, REDIS_URL 已被忽略)
  REDIS_CONNECTION_STRING: redis://redis:6379
  # S3/MinIO(blob 存储,events)
  S3_ENDPOINT: http://minio:9000
  S3_ACCESS_KEY: ${LANGFUSE_MINIO_USER:-langfuse_minio}
  S3_SECRET_KEY: ${LANGFUSE_MINIO_PW:-langfuse_minio_pw}
  S3_BUCKET: langfuse
  S3_REGION: us-east-1
  S3_FORCE_PATH_STYLE: "true"
  LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
  LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
  LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
  LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_MINIO_USER:-langfuse_minio}
  LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_PW:-langfuse_minio_pw}
  LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
  # 应用密钥 / Application secrets (建议首次启动后在 UI 中生成 / Generate in UI after first start)
  NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
  SALT: ${LANGFUSE_SALT:-generate-a-random-salt-here}
  NEXTAUTH_URL: http://127.0.0.1:3001
  # 公网 host(让 web 拼出正确回调)
  HOSTNAME: 0.0.0.0
  # telemetry 关闭
  TELEMETRY_ENABLED: "false"

services:
  postgres:
    image: postgres:16-alpine
    container_name: langfuse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_PG_PW:-langfuse_pw}
      POSTGRES_DB: langfuse
    volumes:
      - D:/data/langfuse/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: langfuse-clickhouse
    restart: unless-stopped
    user: "101:101"
    environment:
      CLICKHOUSE_DB: langfuse
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CH_PW:-langfuse_pw}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 3G

  redis:
    image: redis:7-alpine
    container_name: langfuse-redis
    restart: unless-stopped
    volumes:
      - D:/data/langfuse/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  minio:
    image: minio/minio:latest
    container_name: langfuse-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${LANGFUSE_MINIO_USER:-langfuse_minio}
      MINIO_ROOT_PASSWORD: ${LANGFUSE_MINIO_PW:-langfuse_minio_pw}
    volumes:
      - D:/data/langfuse/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  minio-setup:
    image: minio/mc:latest
    container_name: langfuse-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${LANGFUSE_MINIO_USER:-langfuse_minio} ${LANGFUSE_MINIO_PW:-langfuse_minio_pw} &&
      mc mb --ignore-existing local/langfuse &&
      echo 'MinIO bucket ready'
      "
    restart: "no"

  langfuse-web:
    image: langfuse/langfuse:latest
    container_name: langfuse-web
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      <<: *langfuse-env
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 2G

  langfuse-worker:
    image: langfuse/langfuse-worker:latest
    container_name: langfuse-worker
    restart: unless-stopped
    environment:
      <<: *langfuse-env
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  langfuse_clickhouse_data:


